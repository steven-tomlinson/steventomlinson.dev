<!DOCTYPE html>
<html lang="en" data-theme="slate-copper">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,650&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // Persist theme preference (A/B/C) for lightweight testing
    (function () {
      try {
        var t = localStorage.getItem('st_theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <main class="container">
    <header class="site-header">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <a href="{{ '/' | relative_url }}">Steven&nbsp;Tomlinson</a>
        <span aria-hidden="true">·</span>
        <span>Systems&nbsp;Architect</span>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a>
        <a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} aria-current="page"{% endif %}>Blog</a>
        <a href="https://github.com/steven-tomlinson" rel="me noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/pakana/" rel="me noopener">LinkedIn</a>
      </nav>
    </header>

    {{ content }}

    <footer class="site-footer">
      <span class="mono">© {{ site.time | date: "%Y" }} {{ site.author }} · Las Vegas, NV</span>
      <span class="theme-switch" role="group" aria-label="Color theme">
        <button type="button" data-theme-key="slate-copper" aria-pressed="true" title="Slate + Copper">A</button>
        <button type="button" data-theme-key="indigo-cyan" aria-pressed="false" title="Indigo + Cyan">B</button>
        <button type="button" data-theme-key="charcoal-phosphor" aria-pressed="false" title="Charcoal + Phosphor">C</button>
      </span>
    </footer>
  </main>

  <script>
    (function () {
      var root = document.documentElement;
      var current = root.getAttribute('data-theme') || 'slate-copper';
      var buttons = document.querySelectorAll('.theme-switch button');
      function sync() {
        buttons.forEach(function (b) {
          b.setAttribute('aria-pressed', b.dataset.themeKey === current ? 'true' : 'false');
        });
      }
      buttons.forEach(function (b) {
        b.addEventListener('click', function () {
          current = b.dataset.themeKey;
          root.setAttribute('data-theme', current);
          try { localStorage.setItem('st_theme', current); } catch (e) {}
          sync();
        });
      });
      sync();
    })();
  </script>
</body>
</html>
